spring:
  application:
    name: personal-finance-tracker
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/personal_finance}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

server:
  port: ${SERVER_PORT:8080}
